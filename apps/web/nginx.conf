server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Cache hashed assets aggressively
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # SPA fallback — let React Router / TanStack Router handle paths
  location / {
    try_files $uri /index.html;
  }
}
