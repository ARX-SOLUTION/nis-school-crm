services:
  postgres:
    image: postgres:15-alpine
    container_name: nis-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-nis_crm}
      POSTGRES_USER: ${DB_USER:-nis_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me_strong}
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      - nis_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-nis_admin} -d ${DB_NAME:-nis_crm}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nis-redis-dev
    restart: unless-stopped
    command: >
      sh -c 'redis-server --requirepass "$$REDIS_PASSWORD" --appendonly yes'
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-change_me_strong}
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - nis_redis_data:/data
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli -a "$$REDIS_PASSWORD" ping | grep PONG']
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: nis-rabbitmq-dev
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-nis_mq}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-change_me_strong}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-/}
    ports:
      - '${RABBITMQ_PORT:-5672}:5672'
      - '${RABBITMQ_MGMT_PORT:-15672}:15672'
    volumes:
      - nis_rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', 'ping']
      interval: 15s
      timeout: 10s
      retries: 5

volumes:
  nis_postgres_data:
  nis_redis_data:
  nis_rabbitmq_data:
